<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cards Columns</title>

    <link rel="stylesheet" href="Bootstrap/css/bootstrap.min.css">

    <style>
        .card {
            border-width: 12px;
        }

        .card-img-top {
            padding: 10px;
        }

        .card-body {
            text-align: center;
            padding: 8px;
        }
    </style>
</head>

<body>

    <div class="container mt-3">
        <h3>Cards Columns</h3>
        <div class="row">
            <div class="col-md-4">
                <div class="card border-primary mb-3">
                    <img src="Img/Car.png" class="card-img-top" alt="Car">
                    <div class="card-body">
                        <p class="card-text">
                            Some text inside the first card
                        </p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card border-warning mb-3">
                    <img src="Img/Car.png" class="card-img-top" alt="Car">
                    <div class="card-body">
                        <p class="card-text">
                            Some text inside the first card
                        </p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card border-danger mb-3">
                    <img src="Img/Car.png" class="card-img-top" alt="Car">
                    <div class="card-body">
                        <p class="card-text">
                            Some text inside the first card
                        </p>
                    </div>
                </div>
            </div>

        </div>
    </div>

</body>

</html>
